<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>War Room — incident response crew</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🛰️</text></svg>" />
<link rel="stylesheet" href="https://esm.sh/reactflow@11.11.4/dist/style.css" />
<style>
  :root {
    --bg: #0a0e16; --panel: #0f1622; --panel2: #141d2b; --line: #1f2c3e;
    --txt: #e6edf6; --dim: #8aa0b8; --accent: #38bdf8; --danger: #ff5d6c;
    --warn: #ffb454; --ok: #36d399; --gold: #ffd166;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: radial-gradient(1200px 600px at 70% -10%, #13203200, #0a0e16),
                var(--bg);
    color: var(--txt);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .app { display: grid; grid-template-columns: 340px 1fr; grid-template-rows: 56px 1fr;
         grid-template-areas: "head head" "side main"; height: 100%; }
  header { grid-area: head; display: flex; align-items: center; gap: 14px;
           padding: 0 18px; border-bottom: 1px solid var(--line); background: var(--panel); }
  header .logo { font-weight: 800; letter-spacing: .14em; }
  header .logo b { color: var(--danger); }
  header .tag { color: var(--dim); font-size: 12px; }
  header .chips { margin-left: auto; display: flex; gap: 8px; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line);
          color: var(--dim); background: #0b1320; }
  .chip.on { color: var(--ok); border-color: #1d4a3a; }
  .chip.off { color: var(--dim); }
  aside { grid-area: side; border-right: 1px solid var(--line); background: var(--panel);
          padding: 14px; overflow-y: auto; }
  main { grid-area: main; position: relative; }
  .sect { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--dim);
          margin: 14px 0 7px; }
  .scenarios { display: flex; flex-direction: column; gap: 6px; }
  .scn { text-align: left; padding: 9px 11px; border-radius: 9px; cursor: pointer;
         border: 1px solid var(--line); background: var(--panel2); color: var(--txt); font-size: 13px; }
  .scn.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .scn small { display: block; color: var(--dim); margin-top: 3px; font-size: 11px; }
  textarea { width: 100%; background: #070b12; color: #cfe; border: 1px solid var(--line);
             border-radius: 8px; padding: 8px; font: 11px/1.4 ui-monospace, Menlo, monospace;
             resize: vertical; }
  .raw { margin-bottom: 8px; }
  .raw label { font-size: 11px; color: var(--dim); display: block; margin-bottom: 3px; }
  .fire { width: 100%; margin-top: 8px; padding: 12px; border: 0; border-radius: 10px;
          background: linear-gradient(180deg, #ff6b78, #e23748); color: #fff; font-weight: 800;
          font-size: 14px; letter-spacing: .04em; cursor: pointer; }
  .fire:disabled { filter: grayscale(.6) brightness(.7); cursor: wait; }
  .alert { margin: 10px 0; padding: 9px 11px; border-radius: 9px; font-size: 12px;
           background: #2a0f15; border: 1px solid #5b2230; color: #ffc9d0; display: none; }
  .alert.show { display: block; }

  /* nodes */
  .node { width: 230px; border-radius: 14px; border: 1px solid var(--line);
          background: linear-gradient(180deg, var(--panel2), var(--panel));
          padding: 12px 13px; transition: box-shadow .25s, border-color .25s, transform .2s; }
  .node .top { display: flex; align-items: center; gap: 8px; }
  .node .ic { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
              background: #0b1320; font-size: 15px; }
  .node .name { font-weight: 700; font-size: 13px; }
  .node .role { color: var(--dim); font-size: 10.5px; }
  .node .status { margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 999px;
                  border: 1px solid var(--line); color: var(--dim); }
  .node .body { margin-top: 9px; font-size: 11.5px; color: #cdd9e6; min-height: 14px; }
  .node .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 6px; border: 1px solid var(--line);
           color: var(--dim); }
  .badge.sev-critical, .badge.sev-high { color: #fff; }
  .sev-critical { background: #4a1119; border-color: #7c1d2a; }
  .sev-high { background: #4a2a10; border-color: #7c4a1d; }
  .sev-medium { background: #3a3410; border-color: #6b611d; }
  .sev-low { background: #14331f; border-color: #1d6b3f; }
  .badge.cause { color: var(--gold); border-color: #5a4a16; background: #221c08; }

  .node.idle { opacity: .85; }
  .node.investigating { border-color: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  .node.done { border-color: #2b6f5a; }
  .node.commander { width: 250px; border-color: #2a3a52; }
  .node.commander.working { border-color: var(--gold); animation: pulseGold 1s ease-in-out infinite; }
  .node.commander.solved { border-color: var(--ok); background: linear-gradient(180deg, #0f2a20, #0b1f18);
                           box-shadow: 0 0 32px #36d39455; }
  .node .verdict { margin-top: 8px; font-size: 12px; }
  .node .verdict b { color: var(--ok); }
  .node .action { margin-top: 6px; font-size: 11.5px; color: #d7ffe9; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 #38bdf800; } 50% { box-shadow: 0 0 26px 2px #38bdf855; } }
  @keyframes pulseGold { 0%,100% { box-shadow: 0 0 0 0 #ffd16600; } 50% { box-shadow: 0 0 30px 3px #ffd16677; } }

  /* report panel */
  .report { position: absolute; right: 14px; bottom: 14px; width: 380px; max-height: 56%;
            overflow-y: auto; background: rgba(12,18,28,.96); border: 1px solid var(--line);
            border-radius: 14px; padding: 14px; backdrop-filter: blur(6px); display: none; }
  .report.show { display: block; }
  .report h3 { margin: 0 0 4px; font-size: 13px; }
  .report .narr { color: #d7e3f0; font-size: 12.5px; margin-bottom: 10px; }
  .report .adj { font-size: 12px; color: var(--gold); border-left: 2px solid var(--gold);
                 padding-left: 8px; margin-bottom: 10px; }
  .hyp { border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; margin-bottom: 7px;
         background: var(--panel2); }
  .hyp.top { border-color: var(--ok); }
  .hyp .h1 { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 12.5px; }
  .hyp .score { margin-left: auto; color: var(--dim); font-size: 11px; }
  .hyp .meta { color: var(--dim); font-size: 11px; margin-top: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, { useState, useEffect, useCallback, useRef } from "https://esm.sh/react@18.3.1";
import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
import htm from "https://esm.sh/htm@3.1.1";
import ReactFlow, { Background, Controls, Handle, Position, useNodesState, useEdgesState }
  from "https://esm.sh/reactflow@11.11.4?deps=react@18.3.1,react-dom@18.3.1";

const html = htm.bind(React.createElement);

const META = {
  logs:    { name: "Logs Agent",    role: "error logs · stack traces", ic: "📜", x: 60,  y: 40 },
  metrics: { name: "Metrics Agent", role: "latency · error rate · CPU", ic: "📈", x: 700, y: 40 },
  deploys: { name: "Deploys Agent", role: "deploys · config · merges",  ic: "🚀", x: 380, y: 470 },
  commander:{ name: "Incident Commander", role: "correlate · rank · adjudicate", ic: "🛰️", x: 380, y: 220 },
};

function InvestigatorNode({ data }) {
  const m = META[data.source];
  const f = data.finding;
  return html`
    <div class=${"node " + data.phase}>
      <${Handle} type="target" position=${Position.Top} style=${{ opacity: 0 }} />
      <div class="top">
        <div class="ic">${m.ic}</div>
        <div>
          <div class="name">${m.name}</div>
          <div class="role">${m.role}</div>
        </div>
        <div class="status">${data.statusLabel}</div>
      </div>
      <div class="body">${f ? f.finding : (data.phase === "investigating" ? "investigating…" : "standing by")}</div>
      ${f && html`<div class="badges">
        <span class=${"badge sev-" + f.severity}>${f.severity}</span>
        <span class="badge">conf ${Math.round(f.confidence * 100)}%</span>
        <span class="badge cause">→ ${f.points_to}</span>
      </div>`}
      <${Handle} type="source" position=${Position.Bottom} style=${{ opacity: 0 }} />
    </div>`;
}

function CommanderNode({ data }) {
  return html`
    <div class=${"node commander " + data.phase}>
      <${Handle} type="source" position=${Position.Bottom} style=${{ opacity: 0 }} />
      <${Handle} type="target" position=${Position.Top} style=${{ opacity: 0 }} />
      <div class="top">
        <div class="ic">🛰️</div>
        <div>
          <div class="name">Incident Commander</div>
          <div class="role">correlate · rank · adjudicate</div>
        </div>
        <div class="status">${data.statusLabel}</div>
      </div>
      ${data.top && html`<div class="verdict">Root cause: <b>${data.top.cause}</b> · ${data.top.confidence}</div>`}
      ${data.top && html`<div class="action">⤷ ${data.top.suggested_action}</div>`}
    </div>`;
}

const nodeTypes = { investigator: InvestigatorNode, commander: CommanderNode };

function baseNodes() {
  const mk = (id, type) => ({
    id, type, position: { x: META[id].x, y: META[id].y },
    data: { source: id, phase: "idle", statusLabel: "idle", finding: null, top: null },
    draggable: true,
  });
  return [mk("commander", "commander"), mk("logs", "investigator"),
          mk("metrics", "investigator"), mk("deploys", "investigator")];
}
function baseEdges() {
  const e = (s) => ({ id: "e-" + s, source: "commander", target: s, animated: false,
                      style: { stroke: "#2a3a52", strokeWidth: 2 } });
  return [e("logs"), e("metrics"), e("deploys")];
}

function App() {
  const [scenarios, setScenarios] = useState([]);
  const [sel, setSel] = useState(null);
  const [raw, setRaw] = useState({ logs: "", metrics: "", deploys: "" });
  const [running, setRunning] = useState(false);
  const [status, setStatus] = useState({ traced: false, llm: false });
  const [alert, setAlert] = useState("");
  const [report, setReport] = useState(null);
  const [nodes, setNodes, onNodesChange] = useNodesState(baseNodes());
  const [edges, setEdges, onEdgesChange] = useEdgesState(baseEdges());

  useEffect(() => {
    fetch("/api/status").then(r => r.json()).then(setStatus).catch(() => {});
    fetch("/api/scenarios").then(r => r.json()).then(list => {
      setScenarios(list);
      if (list.length) choose(list[0]);
    });
  }, []);

  function choose(s) {
    setSel(s.id);
    setRaw({ logs: s.logs, metrics: s.metrics, deploys: s.deploys });
  }

  const patchNode = useCallback((id, patch) => {
    setNodes(ns => ns.map(n => n.id === id ? { ...n, data: { ...n.data, ...patch } } : n));
  }, [setNodes]);

  const patchEdge = useCallback((id, patch) => {
    setEdges(es => es.map(e => e.id === id ? { ...e, ...patch, style: { ...e.style, ...(patch.style || {}) } } : e));
  }, [setEdges]);

  function handle(ev) {
    switch (ev.type) {
      case "incident":
        setAlert(ev.alert); setReport(null);
        break;
      case "dispatch":  // A2A fan-out — all edges fire at once
        ev.agents.forEach(s => {
          patchEdge("e-" + s, { animated: true, style: { stroke: "#38bdf8", strokeWidth: 2.5 } });
        });
        patchNode("commander", { phase: "working", statusLabel: "dispatching" });
        break;
      case "agent_start":
        patchNode(ev.source, { phase: "investigating", statusLabel: "investigating" });
        break;
      case "finding":
        patchNode(ev.source, { phase: "done", statusLabel: "reported", finding: ev.finding });
        break;
      case "correlate": {
        patchNode("commander", { phase: "working", statusLabel: "correlating" });
        const conv = new Set((ev.ranked[0] && ev.ranked[0].converging_sources) || []);
        ["logs", "metrics", "deploys"].forEach(s => {
          const on = conv.has(s);
          patchEdge("e-" + s, {
            animated: on, label: on ? "correlates" : undefined,
            labelStyle: { fill: "#ffd166", fontSize: 10 },
            style: { stroke: on ? "#ffd166" : "#243245", strokeWidth: on ? 3 : 1.5 },
          });
        });
        break;
      }
      case "hypothesis": {
        const top = ev.report.ranked[0];
        patchNode("commander", { phase: "solved", statusLabel: "root cause", top });
        ["logs", "metrics", "deploys"].forEach(s => {
          if ((top.converging_sources || []).includes(s))
            patchEdge("e-" + s, { style: { stroke: "#36d399", strokeWidth: 3 } });
        });
        setReport(ev.report);
        break;
      }
      case "error":
        setAlert("ERROR: " + ev.message); setRunning(false);
        break;
      case "done":
        setRunning(false);
        break;
    }
  }

  async function fire() {
    setRunning(true); setReport(null);
    setNodes(baseNodes()); setEdges(baseEdges());
    // brief reset so React Flow re-renders the cleared state before animating
    await new Promise(r => setTimeout(r, 60));
    const resp = await fetch("/api/investigate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ scenario: sel, ...raw }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const chunk = buf.slice(0, i); buf = buf.slice(i + 2);
        if (chunk.startsWith("data: ")) handle(JSON.parse(chunk.slice(6)));
      }
    }
    setRunning(false);
  }

  return html`
    <div class="app">
      <header>
        <div class="logo"><b>WAR</b> ROOM</div>
        <div class="tag">multi-agent incident response</div>
        <div class="chips">
          <span class=${"chip " + (status.llm ? "on" : "off")}>${status.llm ? "GPT-4o live" : "mock LLM"}</span>
          <span class=${"chip " + (status.traced ? "on" : "off")}>${status.traced ? "Weave tracing" : "Weave off"}</span>
        </div>
      </header>

      <aside>
        <div class="sect">Incident scenario</div>
        <div class="scenarios">
          ${scenarios.map(s => html`
            <button key=${s.id} class=${"scn " + (sel === s.id ? "active" : "")}
                    onClick=${() => choose(s)}>
              ${s.title}
              <small>${s.id === "db-vs-deploy" ? "agents disagree → Commander adjudicates" : "clean convergence"}</small>
            </button>`)}
        </div>

        <div class="alert ${alert ? "show" : ""}">${alert}</div>

        <div class="sect">Raw signals (paste live)</div>
        ${["logs", "metrics", "deploys"].map(k => html`
          <div class="raw" key=${k}>
            <label>${k}</label>
            <textarea rows=${k === "deploys" ? 4 : 5} value=${raw[k]}
              onInput=${e => setRaw({ ...raw, [k]: e.target.value })}></textarea>
          </div>`)}

        <button class="fire" disabled=${running || !sel} onClick=${fire}>
          ${running ? "investigating…" : "🚨 Trigger Incident"}
        </button>
      </aside>

      <main>
        <${ReactFlow} nodes=${nodes} edges=${edges} nodeTypes=${nodeTypes}
            onNodesChange=${onNodesChange} onEdgesChange=${onEdgesChange}
            fitView minZoom=${0.4} proOptions=${{ hideAttribution: true }}>
          <${Background} color="#1b2740" gap=${22} />
          <${Controls} showInteractive=${false} />
        </${ReactFlow}>

        <div class="report ${report ? "show" : ""}">
          ${report && html`
            <h3>Commander verdict</h3>
            <div class="narr">${report.narrative}</div>
            ${report.adjudication && html`<div class="adj">⚖︎ ${report.adjudication}</div>`}
            <div class="sect">Ranked hypotheses</div>
            ${report.ranked.map((h, i) => html`
              <div class=${"hyp " + (i === 0 ? "top" : "")} key=${h.cause}>
                <div class="h1">
                  ${i === 0 ? "①" : "②③④".charAt(i - 1)} ${h.cause}
                  <span class="score">score ${h.score} · ${h.confidence}</span>
                </div>
                <div class="meta">sources: ${h.converging_sources.join(", ")} · action: ${h.suggested_action}</div>
              </div>`)}
          `}
        </div>
      </main>
    </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
